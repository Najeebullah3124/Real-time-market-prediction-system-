version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - MLFLOW_TRACKING_URI=sqlite:///mlflow.db
    restart: always

  # Optional: MLflow UI service
  mlflow:
    image: ghcr.io/mlflow/mlflow
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    working_dir: /app
    command: mlflow ui --host 0.0.0.0
