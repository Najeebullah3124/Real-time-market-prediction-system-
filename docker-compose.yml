# Market Prediction API + MLflow UI + optional Apache Airflow (profile: airflow)
#
# Prerequisite files on the host (project root): scaler.pkl, mlflow.db, mlruns/
# after training (train.py). They are gitignored but required at runtime for API.
#
# Usage:
#   docker compose up --build                                    # API + MLflow only
#   COMPOSE_PROFILES=airflow docker compose up --build           # + Postgres + Airflow
#
# If bind-mount permission errors appear on Linux/EC2, set AIRFLOW_UID to your host UID (e.g. export AIRFLOW_UID=$(id -u)).
#
# Ports: API 8000, MLflow 5000, Airflow UI 8080
#
# First Airflow login (after airflow-init): admin / value of AIRFLOW_ADMIN_PASSWORD (default admin)

x-airflow-common: &airflow-common
  profiles: ["airflow"]
  build:
    context: .
    dockerfile: Dockerfile.airflow
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-LB6sm5y9NZ6g-Eg5DRgRehgfHMuLhMZt4EKs0U6NAME=}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
    AIRFLOW_PROJECT_DIR: /opt/airflow/project
    MLFLOW_TRACKING_URI: sqlite:////opt/airflow/project/mlflow.db
    AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs/airflow:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - .:/opt/airflow/project
  user: "${AIRFLOW_UID:-50000}:0"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: market-prediction-api
    ports:
      - "8000:8000"
    environment:
      MLFLOW_TRACKING_URI: sqlite:////app/mlflow.db
    volumes:
      - .:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.2
    container_name: market-prediction-mlflow
    ports:
      - "5000:5000"
    working_dir: /app
    command:
      - mlflow
      - ui
      - --host
      - "0.0.0.0"
      - --port
      - "5000"
      - --backend-store-uri
      - sqlite:////app/mlflow.db
    volumes:
      - .:/app
    restart: unless-stopped

  postgres:
    profiles: ["airflow"]
    image: postgres:16-alpine
    container_name: market-prediction-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_airflow:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      retries: 5
      start_period: 10s

  airflow-init:
    <<: *airflow-common
    container_name: market-prediction-airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --password "$${AIRFLOW_ADMIN_PASSWORD}" \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
    restart: "no"

  airflow-scheduler:
    <<: *airflow-common
    container_name: market-prediction-airflow-scheduler
    command: scheduler
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-webserver:
    <<: *airflow-common
    container_name: market-prediction-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres_airflow:
