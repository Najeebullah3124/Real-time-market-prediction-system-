# Market Prediction API + MLflow UI
#
# Prerequisite files on the host (project root): scaler.pkl, mlflow.db, mlruns/
# after training (train.py). They are gitignored but required at runtime.
#
#   docker compose up --build
#
# API: http://localhost:8000/docs   Health: http://localhost:8000/health
# MLflow UI: http://localhost:5000
#
# Bind mount keeps your repo files (including MLflow DB + mlruns) in sync with the containers.

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: market-prediction-api
    ports:
      - "8000:8000"
    environment:
      MLFLOW_TRACKING_URI: sqlite:////app/mlflow.db
    volumes:
      - .:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.2
    container_name: market-prediction-mlflow
    ports:
      - "5000:5000"
    working_dir: /app
    command:
      - mlflow
      - ui
      - --host
      - "0.0.0.0"
      - --port
      - "5000"
      - --backend-store-uri
      - sqlite:////app/mlflow.db
    volumes:
      - .:/app
    restart: unless-stopped
