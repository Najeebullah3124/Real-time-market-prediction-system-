# CI: validate Compose + build Docker images (Airflow layer only on main / manual).
# CD: SSH to EC2 and run scripts/deploy.sh.
#
# Required repository secrets:
#   EC2_HOST        — e.g. 54.234.214.235
#   EC2_USER        — e.g. ubuntu
#   EC2_SSH_KEY     — full private key text (same as Mlops.pem; never commit .pem)
# Optional:
#   EC2_DEPLOY_PATH — clone path on server (default /opt/market-prediction)
#
# EC2: open inbound TCP 22 from GitHub Actions IPs, or use a self-hosted runner on the instance.

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-compose:
    name: Validate docker compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docker Compose config
        run: docker compose --profile airflow config --quiet

  build-images:
    name: Build Docker images
    needs: validate-compose
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: market-prediction-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Airflow image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.airflow
          push: false
          tags: market-prediction-airflow:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    needs: build-images
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ secrets.EC2_DEPLOY_PATH }}"
            if [ -z "$DEPLOY_PATH" ]; then
              DEPLOY_PATH="/opt/market-prediction"
            fi
            mkdir -p "$DEPLOY_PATH"
            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              echo "Clone repo first on the server, for example:"
              echo "  sudo mkdir -p /opt/market-prediction && sudo chown \$USER:\$USER /opt/market-prediction"
              echo "  git clone https://github.com/abdul-rehman-s/Real-time-market-prediction-system-.git \$DEPLOY_PATH"
              exit 1
            fi
            cd "$DEPLOY_PATH"
            bash scripts/deploy.sh

      - name: Smoke test API (optional)
        continue-on-error: true
        run: |
          curl -fsS --connect-timeout 15 "http://${{ secrets.EC2_HOST }}:8000/health" | head -c 500 || echo "Health check skipped (security group may block GitHub runner IPs)"
